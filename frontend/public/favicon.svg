<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f09433"/>
      <stop offset="25%" style="stop-color:#e6683c"/>
      <stop offset="50%" style="stop-color:#dc2743"/>
      <stop offset="75%" style="stop-color:#cc2366"/>
      <stop offset="100%" style="stop-color:#bc1888"/>
    </linearGradient>
    <clipPath id="c">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#g)"/>
  <!-- Camera body outline -->
  <rect x="12" y="18" width="40" height="30" rx="7" ry="7" fill="none" stroke="white" stroke-width="3"/>
  <!-- Lens circle -->
  <circle cx="32" cy="33" r="9" fill="none" stroke="white" stroke-width="3"/>
  <!-- Inner lens dot -->
  <circle cx="32" cy="33" r="3" fill="white"/>
  <!-- Viewfinder -->
  <rect x="22" y="13" width="10" height="6" rx="2" ry="2" fill="white"/>
  <!-- Flash dot -->
  <circle cx="47" cy="24" r="2.5" fill="white"/>
</svg>